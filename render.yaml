services:
  - type: web
    name: wexa-smart-helpdesk-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: STUB_MODE
        value: "true"
      - key: ALLOW_DB_FALLBACK
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: CORS_ORIGIN
        value: https://wexa-smart-helpdesk.vercel.app,https://wexa-smart-helpdesk-sudhith11s-projects.vercel.app,https://wexa-smart-helpdesk-git-main-sudhith11s-projects.vercel.app
